apiVersion: apps/v1
kind: Deployment
metadata:
  name: jusartificial-api
  namespace: production
  labels:
    app: jusartificial-api
spec:
  replicas: 3 # Scalability (Phase 13)
  selector:
    matchLabels:
      app: jusartificial-api
  template:
    metadata:
      labels:
        app: jusartificial-api
    spec:
      containers:
      - name: api
        image: gcr.io/jusartificial/api:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: FIREBASE_SERVICE_ACCOUNT
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: service-account
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
