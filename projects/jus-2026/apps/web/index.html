<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4c1d95" />
    <title>JusArtificial | Suíte Jurídica Premium</title>
    <link rel="manifest" href="/manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Lato', 'sans-serif'],
              serif: ['Cinzel', 'serif'],
              legal: ['Times New Roman', 'serif'],
            },
            colors: {
              purple: {
                800: '#5b21b6', // Royal Purple
                900: '#4c1d95', // Deep Purple
                950: '#2e1065', // Darkest Purple
              },
              gold: {
                400: '#facc15',
                500: '#eab308', // Classic Gold
                600: '#ca8a04', // Dark Gold
                700: '#a16207',
              },
              blue: {
                900: '#1e3a8a', // Royal Blue
              },
              slate: {
                850: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
              'fade-in-down': 'fadeInDown 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-in-right': 'slideInRight 0.4s ease-out',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideInRight: {
                '0%': { transform: 'translateX(100%)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Lato', sans-serif;
        background-color: #f8fafc;
        font-size: 16px; /* Aumentado base font size */
      }
      .dark body {
        background-color: #0f172a;
        color: #e2e8f0;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Cinzel', serif;
        letter-spacing: 0.02em;
      }
      /* Standard Legal Font */
      .font-legal {
        font-family: 'Times New Roman', Times, serif;
      }
      /* Custom scrollbar for legal documents */
      .legal-scroll::-webkit-scrollbar {
        width: 10px;
      }
      .legal-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .legal-scroll::-webkit-scrollbar-thumb {
        background: #a16207; /* Gold scrollbar */
        border-radius: 5px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .dark .legal-scroll::-webkit-scrollbar-thumb {
        background: #ca8a04;
      }
      .legal-scroll::-webkit-scrollbar-thumb:hover {
        background: #eab308;
      }

      /* Skeleton Loading Animation */
      .skeleton {
        background: #e2e8f0;
        background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
        background-size: 200% 100%;
        animation: 1.5s shine linear infinite;
      }
      .dark .skeleton {
        background: #1e293b;
        background: linear-gradient(110deg, #1e293b 8%, #334155 18%, #1e293b 33%);
      }
      @keyframes shine {
        to {
          background-position-x: -200%;
        }
      }

      /* Print Styles for PDF Generation */
      @media print {
        @page {
          margin: 20mm;
          size: A4;
        }
        body {
          background-color: white;
          overflow: visible !important;
          height: auto !important;
          color: black !important;
        }
        .dark body {
           color: black !important;
           background-color: white !important;
        }
        /* Hide everything by default */
        body > * {
          display: none !important;
        }
        /* Only show the print container */
        #root, #root > div {
           display: block !important;
           height: auto !important;
           overflow: visible !important;
        }
        /* Hide sidebar, headers, chat interface, toolbars */
        nav, header, .sidebar, .chat-interface, .toolbar-actions, button, .no-print {
          display: none !important;
        }
        /* Target the document preview specifically */
        .document-preview-container {
           display: block !important;
           position: absolute !important;
           left: 0 !important;
           top: 0 !important;
           width: 100% !important;
           margin: 0 !important;
           padding: 0 !important;
           background: white !important;
           border: none !important;
           box-shadow: none !important;
        }
        .document-content {
           box-shadow: none !important;
           padding: 0 !important;
           min-height: auto !important;
           overflow: visible !important;
        }
      }
    </style>
